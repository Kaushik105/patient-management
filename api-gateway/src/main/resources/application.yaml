spring:
  application:
    name: api-gateway

  cloud:
    gateway.server.webflux:
      routes:
        - id: patient-service
          predicates:
              - Path=/api/patients/**
          uri: http://patient-service:4000
          filters:
              - StripPrefix=1

        - id: api-patient-service
          predicates:
            - Path=/api-docs/patients
          uri: http://patient-service:4000
          filters:
            - RewritePath=/api-docs/patients, /api-docs
server:
  port: 4003