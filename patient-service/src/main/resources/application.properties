spring.application.name=patient-service
server.port=4000

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5000/db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
billing.service.port=9001
billing.service.address=${BILLING_SERVICE_ADDRESS:localhost}